    <style>
      :root {
        --bg: #fffaf0;
        --surface: rgba(255, 255, 255, 0.9);
        --ink: #111;
        --muted: #5f5b51;
        --line: rgba(16, 16, 16, 0.1);
        --accent: #f6c533;
        --shadow: 0 22px 64px rgba(44, 33, 6, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(80% 60% at 0% 0%, rgba(246, 197, 51, 0.24) 0%, rgba(246, 197, 51, 0) 62%),
          linear-gradient(180deg, #fffdf7 0%, var(--bg) 55%, #fffdf8 100%);
      }

      a {
        color: inherit;
      }

      .tg-page {
        padding: 0 16px 56px;
      }

      .tg-shell {
        width: min(100%, 1180px);
        margin: 0 auto;
      }

      .tg-topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: calc(14px + env(safe-area-inset-top)) 0 14px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        background: linear-gradient(180deg, rgba(255, 252, 243, 0.94), rgba(255, 252, 243, 0.62));
      }

      .tg-brand,
      .tg-link,
      .tg-btn {
        text-decoration: none;
      }

      .tg-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        font-weight: 800;
      }

      .tg-mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, var(--accent), #ffdd78);
        font-size: 0.78rem;
      }

      .tg-link,
      .tg-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.84);
        font-weight: 800;
      }

      .tg-link {
        flex-shrink: 0;
        padding: 10px 14px;
        font-size: 0.84rem;
      }

      .tg-hero {
        display: grid;
        gap: 14px;
        max-width: 780px;
        padding: 46px 0 30px;
      }

      .tg-label {
        width: fit-content;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: #444039;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 5vw, 5.8rem);
        line-height: 0.94;
        letter-spacing: 0;
      }

      .tg-copy {
        margin: 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.7;
      }

      .tg-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 6px;
      }

      .tg-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 12px 18px;
      }

      .tg-btn--primary {
        border-color: transparent;
        background: #111;
        color: #fff;
      }

      .tg-deck {
        display: grid;
        gap: 28px;
      }

      .tg-page-img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 22px;
        box-shadow: var(--shadow);
        background: #fff;
      }

      .tg-mobile-pdf {
        display: none;
      }

      .tg-pdf-frame {
        width: 100%;
        height: calc(100vh - 126px);
        min-height: 560px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      @media (max-width: 899px) {
        html,
        body {
          width: 100%;
          height: 100%;
          overflow: hidden;
          background: #fff;
        }

        .tg-page {
          width: 100%;
          height: 100vh;
          padding: 0;
        }

        .tg-topbar,
        .tg-hero,
        .tg-desktop-deck {
          display: none;
        }

        .tg-mobile-pdf {
          display: block;
          width: 100%;
          height: 100%;
        }

        .tg-shell {
          width: 100%;
          height: 100%;
          margin: 0;
        }

        .tg-pdf-frame {
          display: block;
          width: 100%;
          height: 100vh;
          min-height: 100vh;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }
      }

      @media (min-width: 900px) {
        body {
          background: #000;
        }

        .tg-page {
          padding-top: 34px;
        }

        .tg-topbar,
        .tg-hero {
          display: none;
        }

        .tg-page-img {
          border-radius: 22px;
          box-shadow: none;
        }
      }
    </style>
